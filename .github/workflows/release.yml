name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Verify manifest version matches tag
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF_NAME}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "manifest.json version ($VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
